
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ACP Pradyuman Voice Board</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

overflow:hidden;

background:
linear-gradient(
rgba(0,0,0,.45),
rgba(0,0,0,.82)
),
url("https://upload.wikimedia.org/wikipedia/en/8/88/Shivaji_Satam.jpg");

background-size:cover;

background-position:center;

background-repeat:no-repeat;

}

/* Glow effect */

body::before{

content:"";

position:fixed;

width:150%;

height:150%;

background:
radial-gradient(
circle,
rgba(255,255,255,.08),
transparent 60%
);

animation:
rotate 18s linear infinite;

pointer-events:none;

}

@keyframes rotate{

from{
transform:rotate(0);
}

to{
transform:rotate(360deg);
}

}

.container{

position:relative;

z-index:10;

width:min(430px,100%);

padding:40px 28px;

border-radius:28px;

text-align:center;

backdrop-filter:blur(18px);

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.15);

box-shadow:
0 0 50px rgba(255,255,255,.15);

}

h1{

color:white;

font-size:clamp(28px,6vw,40px);

margin-bottom:10px;

letter-spacing:2px;

text-shadow:
0 0 30px gold;

}

.subtitle{

color:#ddd;

margin-bottom:30px;

font-size:clamp(13px,3vw,16px);

}

button{

width:100%;

padding:18px;

margin:14px 0;

border:none;

border-radius:18px;

font-size:clamp(16px,4vw,19px);

font-weight:bold;

cursor:pointer;

color:white;

transition:.3s;

}

.btn1{

background:
linear-gradient(
45deg,
#ff512f,
#dd2476
);

}

.btn2{

background:
linear-gradient(
45deg,
#4776E6,
#8E54E9
);

}

.btn3{

background:
linear-gradient(
45deg,
#00b09b,
#96c93d
);

}

button:hover{

transform:
translateY(-4px)
scale(1.02);

box-shadow:
0 0 30px rgba(255,255,255,.6);

}

button:active{

transform:
scale(.98);

}

.quote{

margin-top:20px;

color:white;

font-size:clamp(14px,3vw,18px);

opacity:.9;

}

.playing{

animation:
pulse .8s infinite;

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.03);
}

100%{
transform:scale(1);
}

}

/* Mobile */

@media (max-width:600px){

.container{

padding:28px 18px;

border-radius:22px;

}

button{

padding:16px;

}

}

/* Small height screens */

@media (max-height:700px){

body{

align-items:flex-start;

padding-top:30px;

}

}

</style>

</head>

<body>

<div class="container">

<h1>ACP PRADYUMAN</h1>

<div class="subtitle">
CID Voice Control Panel
</div>

<button class="btn1"
onclick="playVoice(1,this)">
🔍 do not press
</button>

<button class="btn2"
onclick="playVoice(2,this)">
🕵 don't touch
</button>

<button class="btn3"
onclick="playVoice(3,this)">
⚡ dabao na
</button>

<div class="quote">
"maa zudd gyi!"
</div>

</div>

<audio
id="audio1"
src="kya-cheda-bhosdi_dVETGE7r.mp3">
</audio>

<audio
id="audio2"
src="chodu-cid-chut.mp3">
</audio>

<audio
id="audio3"
src="nikal-jao-mere-lo-e-ke-samne-se-y19lype_5gfrtDen.mp3">
</audio>

<script>

function playVoice(num,btn){

document
.querySelectorAll("audio")
.forEach(a=>{

a.pause();

a.currentTime=0;

});

document
.querySelectorAll("button")
.forEach(b=>
b.classList.remove(
"playing"
));

btn.classList.add(
"playing"
);

const audio=
document.getElementById(
"audio"+num
);

audio.play();

audio.onended=
()=>{

btn.classList.remove(
"playing"

);

};

}

</script>

</body>
</html>
